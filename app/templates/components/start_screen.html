<div id="game-container">
<div class="landing-wrapper">
    <div class="landing-container">
        <!-- Hero Section -->
        <div class="landing-hero">
            <h1 class="landing-title">SOC OPS</h1>
            <div class="landing-subtitle">Social Bingo Adventure</div>
            <div class="landing-tagline">Connect. Find. Win.</div>
        </div>

        <!-- Feature Cards -->
        <div class="landing-cards">
            <div class="landing-card" style="animation-delay: 0.1s;">
                <div class="landing-card-icon">👥</div>
                <div class="landing-card-title">Meet People</div>
                <div class="landing-card-text">Find others who match fun questions and prompts</div>
            </div>
            <div class="landing-card" style="animation-delay: 0.2s;">
                <div class="landing-card-icon">🎯</div>
                <div class="landing-card-title">Mark Squares</div>
                <div class="landing-card-text">Tap the board to mark your matches</div>
            </div>
            <div class="landing-card" style="animation-delay: 0.3s;">
                <div class="landing-card-icon">🏆</div>
                <div class="landing-card-title">Get Five</div>
                <div class="landing-card-text">Achieve 5 in a row horizontally, vertically, or diagonally</div>
            </div>
        </div>

        <!-- CTA Button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="landing-button"
            style="animation-delay: 0.4s;">
            🎮 Start Your Adventure
        </button>

        <div class="landing-footer" style="animation-delay: 0.5s;">
            Made for meaningful connections ✨
        </div>
    </div>
</div>
</div>
